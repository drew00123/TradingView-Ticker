<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seamless Ticker</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #191919; /* Notion's Dark Grey */
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        /* THE TRICK: Your working blend mode logic */
        tv-ticker-tape {
            mix-blend-mode: screen;
            filter: brightness(1.1);
        }

        .tradingview-widget-container {
            background-color: transparent !important;
        }

        /* NEW: Kill the blue "Ticker tape by TradingView" hyperlink */
        .tradingview-widget-copyright, 
        .tradingview-widget-copyright a,
        [class*="copyright"] {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            height: 0 !important;
            pointer-events: none !important;
        }
    </style>
</head>
<body>

    <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"></script>
    <tv-ticker-tape 
        symbols="FOREXCOM:SPXUSD,FOREXCOM:NSXUSD,FOREXCOM:DJI,FX:EURUSD,CMCMARKETS:GOLD,NASDAQ:QQQ,NASDAQ:TQQQ,AMEX:XLK,AMEX:VGT,NASDAQ:SMH,NASDAQ:SOXX,CBOE:ARKK,CBOE:IGV,NASDAQ:NVDA,NASDAQ:AAPL,NASDAQ:MSFT,NASDAQ:AMZN,NASDAQ:GOOGL,NASDAQ:META,NASDAQ:TSLA" 
        hide-chart 
        theme="dark">
    </tv-ticker-tape>

</body>
</html>
