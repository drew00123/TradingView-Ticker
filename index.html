<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seamless Ticker</title>
    <style>
        /* 1. Set the page to Notion's exact dark mode hex */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #191919; 
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        /* 2. Force the widget container to be transparent so it shows #191919 through */
        .tradingview-widget-container, 
        .tradingview-widget-container__widget,
        tv-ticker-tape {
            background-color: transparent !important;
            background: transparent !important;
        }

        /* 3. Clean up the edges */
        iframe {
            border: none !important;
        }
    </style>
</head>
<body>

    <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"></script>
    <tv-ticker-tape 
        symbols="FOREXCOM:SPXUSD,FOREXCOM:NSXUSD,FOREXCOM:DJI,FX:EURUSD,CMCMARKETS:GOLD,NASDAQ:QQQ,NASDAQ:TQQQ,AMEX:XLK,AMEX:VGT,NASDAQ:SMH,NASDAQ:SOXX,CBOE:ARKK,CBOE:IGV,NASDAQ:NVDA,NASDAQ:AAPL,NASDAQ:MSFT,NASDAQ:AMZN,NASDAQ:GOOGL,NASDAQ:META,NASDAQ:TSLA" 
        hide-chart 
        theme="dark">
    </tv-ticker-tape>

</body>
</html>
