<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingView Ticker - Dark Fix</title>
    <style>
        /* Force the background to match Notion Dark Mode hex code */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #191919; 
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        /* Ensure the widget container respects the background color */
        .tradingview-widget-container {
            background-color: #191919 !important;
        }
    </style>
</head>
<body>

    <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"></script>
    <tv-ticker-tape 
        symbols="FOREXCOM:SPXUSD,FOREXCOM:NSXUSD,FOREXCOM:DJI,FX:EURUSD,CMCMARKETS:GOLD,NASDAQ:QQQ,NASDAQ:TQQQ,AMEX:XLK,AMEX:VGT,NASDAQ:SMH,NASDAQ:SOXX,CBOE:ARKK,CBOE:IGV,NASDAQ:NVDA,NASDAQ:AAPL,NASDAQ:MSFT,NASDAQ:AMZN,NASDAQ:GOOGL,NASDAQ:META,NASDAQ:TSLA" 
        hide-chart 
        theme="dark">
    </tv-ticker-tape>

</body>
</html>
